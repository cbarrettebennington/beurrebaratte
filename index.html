<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Beurre Baratté &mdash; Ouverture</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Figtree:wght@600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --olive:#1D342D;
    --paper:#F2D995;
  }

  *{ box-sizing:border-box; margin:0; padding:0; }

  html,body{
    background:var(--paper);
    color:var(--olive);
    font-family:'Figtree', sans-serif;
    min-height:100vh;
  }

  .page{
    max-width:640px;
    margin:0 auto;
    padding:64px 32px 96px;
  }

  .logo{
    width:100%;
    max-width:420px;
    height:auto;
    display:block;
  }

  .lede{
    margin-top:56px;
    font-weight:700;
    font-size:14px;
    letter-spacing:0.02em;
    line-height:1.7;
    text-transform:uppercase;
  }

  .lede .gap{
    display:block;
    height:18px;
  }

  footer{
    margin-top:88px;
    font-weight:700;
    font-size:14px;
    letter-spacing:0.02em;
    text-transform:uppercase;
    line-height:2;
    display:flex;
    justify-content:space-between;
    align-items:flex-start;
    text-align:left;
  }

  footer .social{
    list-style:none;
  }

  footer .social a{
    text-decoration:none;
    color:var(--olive);
    border-bottom:1px solid transparent;
    transition:border-color 0.2s ease;
  }

  footer .social a:hover{
    border-color:var(--olive);
  }

  footer .addr{
    text-align:right;
  }

  @media (max-width:480px){
    .page{ padding:48px 24px 72px; }
    .lede{ font-size:13px; }
    footer{ font-size:13px; flex-direction:column; gap:24px; margin-top:64px; }
    footer .addr{ text-align:left; }
  }
  
  a,
a:visited,
a:hover,
a:active {
    color: var(--olive);
}

.button{
    display:inline-block;
    margin-top:8px;
    padding:14px 32px;
    background:var(--olive);
    color:var(--paper) !important;
    text-decoration:none;
    text-transform:uppercase;
    font-size:14px;
    font-weight:700;
    letter-spacing:0.08em;
    border:2px solid var(--olive);
    transition:all .2s ease;
    cursor:pointer;
}

.button:visited{
    color:var(--paper);
}

.button:hover{
    background:transparent;
    color:var(--olive) !important;
}

.button:active{
    background:var(--olive);
    color:var(--paper) !important;
}

</style>
</head>
